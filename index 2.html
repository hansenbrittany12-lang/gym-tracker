<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Block 1">
<title>Block 1</title>
<style>
:root{--bg:#0e0e10;--surface:#18181b;--surface2:#222226;--border:#2e2e33;--accent:#c8f135;--text:#f4f4f5;--muted:#71717a;--green:#4ade80;--yellow:#fbbf24;--red:#f87171;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;min-height:100vh;overflow-x:hidden;}
.top-bar{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);}
.top-right{display:flex;align-items:center;gap:8px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background .3s;}
.sync-dot.saving{background:var(--yellow);}
.sync-dot.saved{background:var(--green);}
.week-badge{font-family:'Courier New',monospace;font-size:11px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;color:var(--muted);cursor:pointer;}
.week-badge span{color:var(--text);}
.edit-btn{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--muted);cursor:pointer;transition:all .15s;}
.edit-btn.on{background:rgba(200,241,53,.1);border-color:var(--accent);color:var(--accent);}
.day-tabs{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:56px;z-index:99;}
.day-tab{padding:14px 8px;text-align:center;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.day-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.day-tab .sub{font-size:10px;font-weight:400;display:block;margin-top:2px;opacity:.7;}
.day-tab.active .sub{opacity:1;}
.main{padding:0 0 120px;}
.warmup{margin:16px 16px 0;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start;}
.warmup .icon{font-size:18px;flex-shrink:0;}
.warmup .text{font-size:12px;line-height:1.6;color:var(--muted);}
.warmup .text strong{color:var(--green);font-size:11px;letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:3px;}
.progress-row{margin:12px 16px 0;display:flex;align-items:center;gap:10px;}
.prog-bg{flex:1;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s;}
.prog-label{font-family:'Courier New',monospace;font-size:11px;color:var(--muted);white-space:nowrap;}
.section-label{padding:20px 16px 8px;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
.section-label.core{color:var(--green);}
.ex-card{margin:0 16px 10px;background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color .15s;}
.ex-card.editing{border-color:rgba(200,241,53,.3);}
.ex-header{padding:14px 14px 10px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.ex-name{font-size:15px;font-weight:700;line-height:1.3;flex:1;background:transparent;border:none;color:var(--text);font-family:-apple-system,sans-serif;padding:0;outline:none;}
.ex-name:read-only{cursor:default;}
.ex-name.editable{background:var(--surface2);border:1px solid var(--accent);border-radius:8px;padding:6px 10px;font-size:14px;}
.ex-badges{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.badge{font-family:'Courier New',monospace;font-size:10px;padding:3px 8px;border-radius:5px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);white-space:nowrap;}
.badge.sets{color:var(--accent);border-color:var(--accent);background:rgba(200,241,53,.07);}
.del-ex-btn{width:28px;height:28px;border-radius:8px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--red);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.ex-cue{padding:0 14px 12px;font-size:11px;color:var(--muted);line-height:1.5;font-style:italic;}
.sets-wrap{border-top:1px solid var(--border);}
.set-row{display:grid;grid-template-columns:36px 1fr 1fr 44px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);gap:8px;transition:background .1s;}
.set-row.has-del{grid-template-columns:36px 1fr 1fr 44px 32px;}
.set-row:last-child{border-bottom:none;}
.set-row.done{background:rgba(200,241,53,.04);}
.set-num{font-family:'Courier New',monospace;font-size:12px;color:var(--muted);text-align:center;}
.input-wrap{display:flex;flex-direction:column;gap:2px;}
.input-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);}
.set-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Courier New',monospace;font-size:16px;font-weight:500;padding:8px 10px;width:100%;text-align:center;-webkit-appearance:none;appearance:none;transition:border-color .15s;}
.set-input:focus{outline:none;border-color:var(--accent);background:rgba(200,241,53,.05);}
.set-input::placeholder{color:var(--border);}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}
.check-btn{width:36px;height:36px;border-radius:10px;border:2px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;}
.check-btn.on{background:var(--accent);border-color:var(--accent);}
.check-btn.on::after{content:'✓';color:#000;font-weight:900;font-size:15px;}
.del-set-btn{width:28px;height:28px;border-radius:7px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--red);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.add-set-btn{width:100%;padding:10px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;font-weight:700;color:var(--accent);background:rgba(200,241,53,.05);border:none;border-top:1px solid var(--border);cursor:pointer;letter-spacing:.06em;text-transform:uppercase;}
.add-ex-btn{margin:0 16px 10px;width:calc(100% - 32px);padding:14px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px;font-weight:700;color:var(--accent);background:rgba(200,241,53,.05);border:1px dashed rgba(200,241,53,.3);border-radius:14px;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;}
.energy-card{margin:0 16px 10px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;}
.energy-lbl{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--yellow);margin-bottom:12px;}
.energy-dots{display:flex;gap:10px;}
.e-dot{flex:1;height:44px;border-radius:10px;border:2px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-family:'Courier New',monospace;font-size:16px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;}
.e-dot.on{border-color:var(--yellow);background:rgba(251,191,36,.12);color:var(--yellow);}
.notes-card{margin:0 16px 10px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;}
.notes-lbl{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.notes-ta{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:-apple-system,sans-serif;font-size:14px;padding:12px;resize:none;min-height:80px;line-height:1.5;}
.notes-ta:focus{outline:none;border-color:var(--accent);}
.notes-ta::placeholder{color:var(--border);}
.save-btn{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;font-family:-apple-system,sans-serif;font-size:14px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;border:none;border-radius:14px;padding:16px 48px;cursor:pointer;box-shadow:0 8px 32px rgba(200,241,53,.25);transition:all .15s;white-space:nowrap;z-index:200;}
.save-btn:active{transform:translateX(-50%) scale(.97);}
.save-btn.saved{background:var(--green);}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--surface);border-radius:20px 20px 0 0;border:1px solid var(--border);border-bottom:none;padding:24px 20px 48px;width:100%;max-width:480px;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;text-align:center;}
.wk-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.wk-btn{padding:16px 8px;border-radius:12px;border:2px solid var(--border);background:var(--surface2);color:var(--text);font-family:-apple-system,sans-serif;font-size:14px;font-weight:700;cursor:pointer;text-align:center;transition:all .15s;}
.wk-btn.on{border-color:var(--accent);color:var(--accent);background:rgba(200,241,53,.07);}
.wk-btn.deload{border-color:var(--yellow);color:var(--yellow);}
.wk-btn small{font-size:10px;font-weight:400;display:block;color:var(--muted);margin-top:2px;}
.modal-close{display:block;width:100%;margin-top:14px;padding:14px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:-apple-system,sans-serif;font-size:14px;cursor:pointer;}
.loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;}
</style>
</head>
<body>
<div class="top-bar">
  <div class="logo">Block 1</div>
  <div class="top-right">
    <div class="sync-dot" id="sync-dot"></div>
    <button class="edit-btn" id="edit-btn" onclick="toggleEdit()">Edit</button>
    <div class="week-badge" onclick="openWeeks()">Week <span id="wk-num">1</span> of 6</div>
  </div>
</div>
<div class="day-tabs">
  <div class="day-tab active" onclick="goDay(0)">Day A<span class="sub">Push+Hinge</span></div>
  <div class="day-tab" onclick="goDay(1)">Day B<span class="sub">Pull+Squat</span></div>
  <div class="day-tab" onclick="goDay(2)">Day C<span class="sub">Full Body</span></div>
</div>
<div class="main" id="main"><div class="loading">Loading…</div></div>
<div class="modal-bg" id="wk-modal">
  <div class="modal">
    <div class="modal-title">Select Week</div>
    <div class="wk-grid" id="wk-grid"></div>
    <button class="modal-close" onclick="closeWeeks()">Cancel</button>
  </div>
</div>
<button class="save-btn" id="save-btn" onclick="doSave()">Save Workout</button>
<script>
var SB='https://pmllrcinpsvwbwxkxxdw.supabase.co';
var SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtbGxyY2lucHN2d2J3eGt4eGR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1Mjc1NzEsImV4cCI6MjA4OTEwMzU3MX0.bQjNhvGAiIJ130CnngY5B1aL9hrOS39B2BzUEAD2jKQ';
function sh(){return{'Content-Type':'application/json','apikey':SK,'Authorization':'Bearer '+SK,'Prefer':'resolution=merge-duplicates'};}

var DEFAULT_DAYS=[
  {id:'a',warmup:"World's greatest stretch x5/side · Cat-cow x10 · Shoulder circles",
   ex:[{n:'Barbell RDL',s:3,r:'8-10',c:'Hinge at hips, soft knee, feel hamstrings load'},
       {n:'Barbell Back Squat',s:3,r:'8-10',c:'Depth to parallel or below, chest tall'},
       {n:'DB Overhead Press (single arm)',s:3,r:'10/side',c:'Standing — core braces hard'},
       {n:'DB Bent-Over Row (single arm)',s:3,r:'10/side',c:'Hinge position, squeeze at top'},
       {n:'DB Lateral Raise',s:2,r:'12-15',c:'Slow and controlled — no swinging'}],
   core:[{n:'Dead Bug',s:3,r:'10/side',c:'Lower back stays flat on floor'},
         {n:'Pallof Press (band or DB)',s:3,r:'10/side',c:'Brace and resist rotation'},
         {n:'Hollow Body Hold',s:3,r:'20-30 sec',c:'Lower back pressed to floor'},
         {n:'DB Glute Bridge',s:3,r:'15',c:'Pause 1 sec at top'}]},
  {id:'b',warmup:"Hip circles · Banded clamshells x15/side · Leg swings",
   ex:[{n:'Barbell Front Squat / Goblet Squat',s:3,r:'8-10',c:'Goblet with DB if front squat uncomfortable'},
       {n:'Barbell Bent-Over Row',s:3,r:'10-12',c:'Bar stays in rack between sets'},
       {n:'Single-Leg DB RDL',s:3,r:'8/side',c:'Balance + posterior chain, soft landing'},
       {n:'DB Curl',s:2,r:'12',c:"Full range, don't swing"},
       {n:'DB Arnold Press',s:2,r:'10',c:'Seated on floor or standing'}],
   core:[{n:'Bird Dog',s:3,r:'10/side',c:'Extend opposite arm+leg, hold 2 sec'},
         {n:'Side Plank with Hip Dip',s:3,r:'10/side',c:"Controlled dip, don't collapse"},
         {n:'DB Glute Bridge March',s:3,r:'12/side',c:'Hold bridge, alternate leg lifts'}]},
  {id:'c',warmup:"Lateral band walks x15/side · Arm circles · 90/90 hip stretch",
   ex:[{n:'Barbell Lunge',s:3,r:'6-8',c:'Knee tracks over toe, controlled descent'},
       {n:'Barbell Overhead Press',s:3,r:'8-10',c:"Both arms, brace core, don't arch"},
       {n:'DB Split Squat (rear foot elevated)',s:3,r:'8/side',c:'3 sec eccentric down'},
       {n:'DB Farmer Carry',s:3,r:'30-40m',c:'Heavy, walk tall, brace hard'},
       {n:'DB Renegade Row',s:3,r:'8/side',c:'Keep hips level — push + pull + core'}],
   core:[{n:'Bear Crawl',s:3,r:'20m',c:'Slow, hips level, breathe'},
         {n:'Stir the Pot (plank on ball)',s:3,r:'30 sec',c:'Small circles, brace through'},
         {n:'DB Glute Bridge (weighted)',s:3,r:'15',c:'Pause at top, controlled descent'}]}
];

// Deep copy days so we can modify them
var DAYS = JSON.parse(JSON.stringify(DEFAULT_DAYS));

var curDay=0,curWeek=1,cache={},saveTimer=null,editMode=false;

function dot(s){var d=document.getElementById('sync-dot');if(d)d.className='sync-dot'+(s?' '+s:'');}
function ek(w,d,e,s,f){return'e_'+w+'_'+d+'_'+e+'_'+s+'_'+f;}
function sk(w,d,f){return's_'+w+'_'+d+'_'+f;}
function gv(k){return cache[k]||'';}
function sv(k,v){cache[k]=v;}

function queue(fn){dot('saving');clearTimeout(saveTimer);saveTimer=setTimeout(async function(){try{await fn();}catch(e){console.log('save err',e);}dot('saved');setTimeout(function(){dot('');},2000);},700);}
function saveEntry(w,d,e,s,f,v){queue(async function(){await fetch(SB+'/rest/v1/workout_logs',{method:'POST',headers:sh(),body:JSON.stringify({week:w,day:d,ex_idx:e,set_idx:s,field:f,value:v})});});}
function saveSession(w,d,f,v){queue(async function(){await fetch(SB+'/rest/v1/session_logs',{method:'POST',headers:sh(),body:JSON.stringify({week:w,day:d,field:f,value:v})});});}

// Save structure changes to session_logs with field='structure'
function saveStructure(){
  var day=DAYS[curDay];
  var data=JSON.stringify({ex:day.ex,core:day.core});
  saveSession(curWeek,day.id,'structure_v1',data);
}

async function loadData(w,d){
  try{
    var r1=await fetch(SB+'/rest/v1/workout_logs?week=eq.'+w+'&day=eq.'+d+'&select=*',{headers:sh()});
    var e=await r1.json();
    if(Array.isArray(e))e.forEach(function(x){cache[ek(x.week,x.day,x.ex_idx,x.set_idx,x.field)]=x.value;});
    var r2=await fetch(SB+'/rest/v1/session_logs?week=eq.'+w+'&day=eq.'+d+'&select=*',{headers:sh()});
    var s=await r2.json();
    if(Array.isArray(s)){
      s.forEach(function(x){cache[sk(x.week,x.day,x.field)]=x.value;});
      // Restore structure if saved
      var struct=s.find(function(x){return x.field==='structure_v1';});
      if(struct&&struct.value){
        try{
          var parsed=JSON.parse(struct.value);
          DAYS[curDay].ex=parsed.ex;
          DAYS[curDay].core=parsed.core;
        }catch(e){}
      } else {
        // Reset to defaults for this day
        DAYS[curDay].ex=JSON.parse(JSON.stringify(DEFAULT_DAYS[curDay].ex));
        DAYS[curDay].core=JSON.parse(JSON.stringify(DEFAULT_DAYS[curDay].core));
      }
    }
  }catch(err){console.log('load err',err);}
}

function totalSets(day){return day.ex.concat(day.core).reduce(function(a,e){return a+e.s;},0);}
function countDone(day){
  var n=0;
  day.ex.forEach(function(e,i){for(var s=0;s<e.s;s++)if(gv(ek(curWeek,day.id,i,s,'done'))==='1')n++;});
  day.core.forEach(function(e,i){for(var s=0;s<e.s;s++)if(gv(ek(curWeek,day.id,i+100,s,'done'))==='1')n++;});
  return n;
}
function updateProgress(){
  var day=DAYS[curDay],done=countDone(day),total=totalSets(day);
  var fill=document.getElementById('prog-fill'),lbl=document.getElementById('prog-lbl');
  if(fill)fill.style.width=(total>0?(done/total*100):0)+'%';
  if(lbl)lbl.textContent=done+' / '+total+' sets';
}

function makeCard(ex,eIdx,dayId,isCore){
  var delBtn=editMode?'<div class="del-ex-btn" onclick="delEx('+eIdx+','+isCore+')">×</div>':'';
  var nameInput='<input class="ex-name'+(editMode?' editable':'')+'" '+(editMode?'':'readonly ')+'value="'+ex.n+'" onchange="renameEx('+eIdx+','+isCore+',this.value)">';
  var rows='';
  for(var s=0;s<ex.s;s++){
    var lv=gv(ek(curWeek,dayId,eIdx,s,'lbs')),rv=gv(ek(curWeek,dayId,eIdx,s,'reps')),done=gv(ek(curWeek,dayId,eIdx,s,'done'))==='1';
    var delSet=editMode?'<div class="del-set-btn" onclick="delSet('+eIdx+','+s+','+isCore+')">−</div>':'';
    rows+='<div class="set-row'+(done?' done':'')+(editMode?' has-del':'')+'" id="sr-'+dayId+'-'+eIdx+'-'+s+'">'
      +'<div class="set-num">'+(s+1)+'</div>'
      +'<div class="input-wrap"><div class="input-lbl">lbs</div><input type="number" inputmode="decimal" class="set-input" placeholder="-" value="'+lv+'" onchange="sf(\''+dayId+'\','+eIdx+','+s+',\'lbs\',this.value)"></div>'
      +'<div class="input-wrap"><div class="input-lbl">reps</div><input type="number" inputmode="decimal" class="set-input" placeholder="-" value="'+rv+'" onchange="sf(\''+dayId+'\','+eIdx+','+s+',\'reps\',this.value)"></div>'
      +'<div class="check-btn'+(done?' on':'')+'" id="cb-'+dayId+'-'+eIdx+'-'+s+'" onclick="tc(\''+dayId+'\','+eIdx+','+s+')"></div>'
      +delSet+'</div>';
  }
  var addSetBtn=editMode?'<button class="add-set-btn" onclick="addSet('+eIdx+','+isCore+')">+ Add Set</button>':'';
  return '<div class="ex-card'+(editMode?' editing':'')+'">'
    +'<div class="ex-header">'+nameInput
    +'<div class="ex-badges"><div class="badge sets">'+ex.s+'x</div><div class="badge">'+ex.r+'</div>'+(editMode?delBtn:'')+'</div></div>'
    +'<div class="ex-cue">'+ex.c+'</div>'
    +'<div class="sets-wrap">'+rows+addSetBtn+'</div></div>';
}

function toggleEdit(){
  editMode=!editMode;
  var btn=document.getElementById('edit-btn');
  btn.textContent=editMode?'Done':'Edit';
  btn.classList.toggle('on',editMode);
  render(true); // re-render without reloading data
}

function addSet(eIdx,isCore){
  var list=isCore?DAYS[curDay].core:DAYS[curDay].ex;
  list[eIdx].s++;
  saveStructure();
  render(true);
}

function delSet(eIdx,sIdx,isCore){
  var list=isCore?DAYS[curDay].core:DAYS[curDay].ex;
  if(list[eIdx].s<=1){alert('Need at least 1 set');return;}
  list[eIdx].s--;
  saveStructure();
  render(true);
}

function delEx(eIdx,isCore){
  if(!confirm('Delete this exercise?'))return;
  if(isCore){DAYS[curDay].core.splice(eIdx,1);}
  else{DAYS[curDay].ex.splice(eIdx,1);}
  saveStructure();
  render(true);
}

function renameEx(eIdx,isCore,val){
  var list=isCore?DAYS[curDay].core:DAYS[curDay].ex;
  list[eIdx].n=val;
  saveStructure();
}

function addEx(isCore){
  var newEx={n:'New Exercise',s:3,r:'8-10',c:'Add form cue here'};
  if(isCore){DAYS[curDay].core.push(newEx);}
  else{DAYS[curDay].ex.push(newEx);}
  saveStructure();
  render(true);
}

async function render(skipLoad){
  if(!skipLoad){document.getElementById('main').innerHTML='<div class="loading">Loading…</div>';}
  var day=DAYS[curDay];
  if(!skipLoad){await loadData(curWeek,day.id);}
  var html='<div class="warmup"><div class="icon">🔥</div><div class="text"><strong>Warm-up · 5 min</strong>'+day.warmup+'</div></div>';
  html+='<div class="progress-row"><div class="prog-bg"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div><div class="prog-label" id="prog-lbl">0 / '+totalSets(day)+' sets</div></div>';
  html+='<div class="section-label">Main Lifts</div>';
  day.ex.forEach(function(e,i){html+=makeCard(e,i,day.id,0);});
  if(editMode)html+='<div class="add-ex-btn" onclick="addEx(0)">+ Add Exercise</div>';
  html+='<div class="section-label core">⬡ Core Finisher</div>';
  day.core.forEach(function(e,i){html+=makeCard(e,i+100,day.id,1);});
  if(editMode)html+='<div class="add-ex-btn" onclick="addEx(1)">+ Add Core Exercise</div>';
  html+='<div class="section-label">Session</div>';
  html+='<div class="energy-card"><div class="energy-lbl">Energy Level</div><div class="energy-dots">';
  for(var n=1;n<=5;n++)html+='<div class="e-dot" id="ed-'+n+'" onclick="setE('+n+')">'+n+'</div>';
  html+='</div></div>';
  html+='<div class="notes-card"><div class="notes-lbl">Session Notes</div><textarea class="notes-ta" id="notes-ta" placeholder="PRs, how you felt, form notes…"></textarea></div>';
  document.getElementById('main').innerHTML=html;
  var se=gv(sk(curWeek,day.id,'energy'));if(se)setEUI(parseInt(se));
  var nt=document.getElementById('notes-ta');
  if(nt){nt.value=gv(sk(curWeek,day.id,'notes'));nt.addEventListener('input',function(){sv(sk(curWeek,day.id,'notes'),nt.value);saveSession(curWeek,day.id,'notes',nt.value);});}
  updateProgress();
}

function sf(d,e,s,f,v){sv(ek(curWeek,d,e,s,f),v);saveEntry(curWeek,d,e,s,f,v);updateProgress();}
function tc(d,e,s){
  var k=ek(curWeek,d,e,s,'done'),was=gv(k)==='1',val=was?'0':'1';
  sv(k,val);saveEntry(curWeek,d,e,s,'done',val);
  var cb=document.getElementById('cb-'+d+'-'+e+'-'+s),sr=document.getElementById('sr-'+d+'-'+e+'-'+s);
  if(!was){cb.classList.add('on');sr.classList.add('done');}else{cb.classList.remove('on');sr.classList.remove('done');}
  updateProgress();
}
function setE(n){sv(sk(curWeek,DAYS[curDay].id,'energy'),String(n));saveSession(curWeek,DAYS[curDay].id,'energy',String(n));setEUI(n);}
function setEUI(n){for(var i=1;i<=5;i++){var el=document.getElementById('ed-'+i);if(el)el.classList.toggle('on',i===n);}}
function goDay(i){curDay=i;editMode=false;document.getElementById('edit-btn').textContent='Edit';document.getElementById('edit-btn').classList.remove('on');document.querySelectorAll('.day-tab').forEach(function(t,j){t.classList.toggle('active',j===i);});render();window.scrollTo(0,0);}
function openWeeks(){
  document.getElementById('wk-grid').innerHTML=[1,2,3,4,5,6].map(function(w){
    return '<button class="wk-btn'+(w===curWeek?' on':'')+(w===5?' deload':'')+'" onclick="pickWeek('+w+')">'+'Week '+w+(w===5?'<small>Deload</small>':'')+'</button>';
  }).join('');
  document.getElementById('wk-modal').classList.add('open');
}
function closeWeeks(){document.getElementById('wk-modal').classList.remove('open');}
function pickWeek(w){curWeek=w;document.getElementById('wk-num').textContent=w;closeWeeks();render();}
function doSave(){var b=document.getElementById('save-btn');b.textContent='✓ Saved';b.classList.add('saved');setTimeout(function(){b.textContent='Save Workout';b.classList.remove('saved');},2000);}
window.onload=function(){render();};
</script>
</body>
</html>
